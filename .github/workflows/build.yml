name: Build Android Kernel
on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup build tools
        run: |
          sudo apt update
          sudo apt install -y gcc-aarch64-linux-gnu flex bison bc libssl-dev
          
      - name: Clone LineageOS kernel
        run: |
          git clone --depth 1 https://github.com/LineageOS/android_kernel_qcom_sm8550.git kernel
          
      - name: Copy DJI device tree
        run: |
          cp kalama_hdk.dts kernel/arch/arm64/boot/dts/qcom/
          
      - name: Build kernel
        run: |
          cd kernel
          export CROSS_COMPILE=aarch64-linux-gnu-
          export ARCH=arm64
          make kalama_defconfig
          make -j$(nproc)
          
      - name: Upload Image
        uses: actions/upload-artifact@v4
        with:
          name: kernel-Image
          path: kernel/arch/arm64/boot/Image
