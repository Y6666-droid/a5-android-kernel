name: Build Kernel with USER_NS
on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup build tools
        run: |
          sudo apt update
          sudo apt install -y gcc-aarch64-linux-gnu flex bison bc libssl-dev libelf-dev
          
      - name: Clone LineageOS kernel
        run: |
          git clone --depth 1 https://github.com/LineageOS/android_kernel_qcom_sm8550.git kernel
          
      - name: Copy DJI device tree and config
        run: |
          cp kalama_clean.dts kernel/arch/arm64/boot/dts/qcom/
          echo 'dtb-$(CONFIG_ARCH_QCOM) += kalama_clean.dtb' >> kernel/arch/arm64/boot/dts/qcom/Makefile
          cp config kernel/arch/arm64/configs/dji_defconfig
          
      - name: Build kernel with USER_NS
        run: |
          cd kernel
          export CROSS_COMPILE=aarch64-linux-gnu-
          export ARCH=arm64
          make dji_defconfig
          scripts/config --disable WERROR
          scripts/config --disable DEBUG_INFO_BTF
          scripts/config --enable USER_NS
          make olddefconfig
          make -j$(nproc) Image.gz dtbs
          
      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: kernel-user-ns
          path: |
            kernel/arch/arm64/boot/Image.gz
            kernel/arch/arm64/boot/dts/qcom/kalama_clean.dtb
